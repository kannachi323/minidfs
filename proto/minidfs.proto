syntax = "proto3";

package minidfs;

enum FileUpdateType {
    CREATED = 0;
    MODIFIED = 1;
    DELETED = 2;
}

// service methods for minidfs
service MiniDFSService {

    // Add your service calls here

    // 1. REQUIRED (Parts 1 & 2): A method to store files on the server
    rpc StoreFile(stream FileBuffer) returns (StoreFileRes);

    // 2. REQUIRED (Parts 1 & 2): A method to fetch files from the server
    rpc FetchFile(FetchFileReq) returns (stream FileBuffer);

    // 3. REQUIRED (Parts 1 & 2): A method to list all files on the server
    rpc ListAllFiles(ListAllFilesReq) returns (ListAllFilesRes);

    // 4. REQUIRED (Parts 1 & 2): A method to get the status of a file on the server
    rpc GetFileStatus(FileStatusReq) returns (FileInfo);

    // Get a file write lock
    rpc GetWriteLock(WriteLockReq) returns (WriteLockRes);

    // Delete file request
    rpc DeleteFile(DeleteFileReq) returns (DeleteFileRes);

    // Callback for file updates
    rpc FileUpdateCallback(FileUpdateReq) returns (stream FileUpdateRes);

}

// Add your message types here
message FileBuffer {
    string client_id = 1;
    string file_path = 2;
    bytes data = 3;
    uint64 offset = 4;
}

message StoreFileRes {
    string msg = 1;
    bool success = 2;
}

message FetchFileReq {
    string file_path = 1;
}

message DeleteFileReq {
    string client_id = 1;
    string file_path = 2;
}

message DeleteFileRes {
    string msg = 1;
    bool success = 2;
}

message FileInfo {
    string file_path = 1;
    string hash = 2;
}

message ListAllFilesReq {
    string dir_path = 1;
}

message ListAllFilesRes {
    repeated FileInfo files = 1;
}

message FileStatusReq {
    string file_path = 1;
}

message WriteLockReq {
    string client_id = 1;
    string file_path = 2;
}

message WriteLockRes {
    bool success = 1;
}

message FileUpdateReq {
    string client_id = 1;
}

message FileUpdateRes {
    FileUpdateType type = 1;
    FileInfo file_info = 2;
    uint64 version = 3;
}